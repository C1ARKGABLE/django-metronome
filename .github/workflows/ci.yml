name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # v5+ / v6+ use Node 24 runtime (avoids Node 20 deprecation on GHA runners).
      - uses: actions/checkout@v5

      # `setup-python` with `cache: poetry` invokes `poetry` during that step — install it first.
      - name: Install Poetry
        run: |
          python3 -m pip install --user poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          # Restores Poetry venv + wheel cache from poetry.lock (see setup-python README).
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install

      - name: Pre-commit (lint + format checks)
        run: poetry run pre-commit run --all-files

      - name: Tests
        run: poetry run pytest
